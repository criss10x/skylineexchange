<!DOCTYPE html>
<html lang="en">
<head>

<title>OG image source — 1200x630</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    font-family: "DM Sans", sans-serif;
    background:
      radial-gradient(720px 460px at 88% -12%, rgba(153, 246, 228, 0.6), transparent 65%),
      radial-gradient(560px 420px at -6% 108%, rgba(94, 234, 212, 0.42), transparent 62%),
      radial-gradient(360px 280px at 72% 6%, rgba(253, 230, 138, 0.35), transparent 62%),
      linear-gradient(180deg, #F0FDFA 0%, #FFFFFF 60%, #F0FDFA 100%);
    color: #0F172A;
  }
  .wrap { position: relative; z-index: 2; padding: 64px 76px; height: 100%; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 14px; font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 21px; letter-spacing: 0.3em; }
  .brand em { font-style: normal; color: #0D9488; }
  .pill {
    margin-top: 84px; align-self: flex-start;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 12px 26px; border: 1.5px solid rgba(15,118,110,0.2); border-radius: 999px;
    background: rgba(255,255,255,0.7);
    font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 17px;
    letter-spacing: 0.3em; color: #0F766E;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #0D9488; }
  h1 {
    margin-top: 30px; max-width: 900px;
    font-family: "Space Grotesk", sans-serif; font-weight: 700;
    font-size: 88px; line-height: 1.02; letter-spacing: -0.03em;
  }
  .domain { margin-top: auto; font-size: 22px; color: #64748B; }
  .domain strong { color: #0F766E; font-weight: 600; }
  svg.sky { position: absolute; left: 0; right: 0; bottom: 0; width: 100%; z-index: 1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><img src="../public/assets/logo.svg" style="width:48px;height:48px" alt="" />SKYLINE<em>EXCHANGE</em></div>
