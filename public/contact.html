<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Skyline Exchange</title>
  <meta name="description" content="Contact Skyline Exchange in Bali via WhatsApp, Instagram, email, or Google Maps." />
  <link rel="canonical" href="https://skylinemoneychanger.com/contact" />
  <meta name="theme-color" content="#00E1D3" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Skyline Exchange" />
  <meta property="og:title" content="Contact — Skyline Exchange" />
  <meta property="og:description" content="Reach Skyline Exchange on WhatsApp, Instagram, email, or Google Maps." />
  <meta property="og:url" content="https://skylinemoneychanger.com/contact" />
  <meta property="og:image" content="https://skylinemoneychanger.com/assets/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=2" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png?v=2" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/styles.css?v=3" />

  <style>
    .contact-page { min-height: 100dvh; display: grid; place-items: center; padding: 120px 20px 96px; }
    .contact-box { width: min(680px, 100%); text-align: center; }
    .contact-title { font-family: var(--font-head); font-weight: 700; font-size: clamp(2rem, 6vw, 3.2rem); letter-spacing: -0.02em; }
    .contact-sub { margin-top: 10px; color: var(--muted); }
    .contact-grid { margin-top: 34px; display: grid; gap: 14px; grid-template-columns: 1fr; }
    .contact-btn {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 22px;
      border: 1px solid var(--border); border-radius: var(--r-card);
      background: var(--glass-strong);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-card);
      color: var(--ink);
      transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out), border-color 0.25s;
    }
    .contact-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-soft); border-color: rgba(0, 129, 120, 0.32); }
    .contact-btn:active { transform: translateY(0); }
    .contact-btn .icon { width: 46px; height: 46px; border-radius: 14px; background: rgba(0, 225, 211, 0.16); color: var(--primary); display: grid; place-items: center; flex: 0 0 46px; }
    .contact-btn .body { text-align: left; }
    .contact-btn .label { font-family: var(--font-head); font-weight: 600; font-size: 17px; }
    .contact-btn .value { font-size: 14px; color: var(--muted); }
    .contact-btn .arrow { margin-left: auto; color: var(--primary); }
    .back { display: inline-flex; align-items: center; gap: 8px; margin-top: 28px; font-size: 14px; color: var(--muted); }
    .back:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <div class="aurora-blob aurora-a"></div>
    <div class="aurora-blob aurora-b"></div>
    <div class="aurora-blob aurora-c"></div>
  </div>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="/" aria-label="Skyline Exchange — home">
      <img class="brand-mark" src="/assets/logo.svg?v=2" alt="" width="40" height="40" />
      <span class="brand-word">SKYLINE<em>EXCHANGE</em></span>
    </a>
  </header>

  <main class="contact-page" role="main">
    <div class="contact-box">
      <h1 class="contact-title" id="contactTitle">Contact us</h1>
      <p class="contact-sub" id="contactSub">Reach Skyline Exchange anytime.</p>
      <div class="contact-grid" id="contactGrid">
        <a id="waBtn" class="contact-btn" href="#" target="_blank" rel="noopener">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.56 12.56 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.56 12.56 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </span>
          <span class="body">
            <span class="label" id="waLabel">WhatsApp</span>
            <span class="value" id="waValue">Chat with us</span>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>

        <a id="igBtn" class="contact-btn" href="#" target="_blank" rel="noopener">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          </span>
          <span class="body">
            <span class="label" id="igLabel">Instagram</span>
            <span class="value" id="igValue">Follow our journey</span>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>

        <a id="emailBtn" class="contact-btn" href="#">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </span>
          <span class="body">
            <span class="label" id="emailLabel">Email</span>
            <span class="value" id="emailValue">Write to us</span>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>

        <a id="mapsBtn" class="contact-btn" href="#" target="_blank" rel="noopener">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </span>
          <span class="body">
            <span class="label" id="mapsLabel">Google Maps</span>
            <span class="value" id="mapsValue">Find us in Bali</span>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </div>

      <a class="back" href="/">← Back to home</a>
    </div>
  </main>

  <script src="/config.js?v=2"></script>
  <script>
    const C = window.SITE_CONFIG || {};
    const i18n = {
      en: { title: "Contact us", sub: "Reach Skyline Exchange anytime.", wa: "Chat with us", ig: "Follow our journey", email: "Write to us", maps: "Find us in Bali" },
      id: { title: "Hubungi kami", sub: "Hubungi Skyline Exchange kapan saja.", wa: "Chat dengan kami", ig: "Ikuti kabar kami", email: "Kirim email", maps: "Temukan kami di Bali" }
    };
    const lang = new URLSearchParams(location.search).get('lang') || 'en';
    const t = i18n[lang] || i18n.en;

    document.getElementById('contactTitle').textContent = t.title;
    document.getElementById('contactSub').textContent = t.sub;

    const waText = (C.i18n && C.i18n[lang] && C.i18n[lang].wa_text) || (C.i18n && C.i18n.en && C.i18n.en.wa_text) || "Hi Skyline Exchange!";
    const waNum = C.whatsapp || '';

    document.getElementById('waBtn').href = waNum ? `https://wa.me/${waNum}?text=${encodeURIComponent(waText)}` : '#';
    document.getElementById('waValue').textContent = t.wa;
    document.getElementById('igBtn').href = C.instagramUrl || '#';
    document.getElementById('igValue').textContent = t.ig;
    document.getElementById('emailBtn').href = C.email ? `mailto:${C.email}` : '#';
    document.getElementById('emailValue').textContent = t.email;
    document.getElementById('mapsBtn').href = C.mapsUrl || '#';
    document.getElementById('mapsValue').textContent = t.maps;
  </script>
</body>
</html>
